<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Buddi Menu</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; color:#fff; font-family:-apple-system,sans-serif; padding-bottom:100px; }
header { background:#0d0d0d; border-bottom:1px solid #1a1a1a; padding:16px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
.brand { font-size:18px; font-weight:700; }
.brand span { color:#22c55e; }
.cart-btn { background:#161616; border:1px solid #222; border-radius:12px; color:#fff; font-size:13px; font-weight:600; padding:8px 16px; cursor:pointer; font-family:inherit; }
main { max-width:480px; margin:0 auto; padding:20px 16px; }
.back { background:none; border:none; color:#555; font-size:13px; cursor:pointer; font-family:inherit; margin-bottom:16px; display:block; }
h1 { font-size:22px; font-weight:700; margin-bottom:4px; }
.sub { color:#444; font-size:13px; margin-bottom:20px; }
.cats { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
.cat { background:none; border:1px solid #222; border-radius:20px; color:#555; font-size:12px; padding:6px 14px; cursor:pointer; font-family:inherit; }
.cat.on { background:#22c55e; border-color:#22c55e; color:#000; font-weight:700; }
.grid { display:flex; flex-direction:column; gap:12px; }
.card { background:#111; border:1px solid #1e1e1e; border-radius:16px; padding:16px; display:flex; gap:14px; }
.icon { width:52px; height:52px; border-radius:12px; background:#0a1a0f; border:1px solid #1a2e1f; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
.info { flex:1; }
.row { display:flex; justify-content:space-between; margin-bottom:4px; }
.name { font-size:15px; font-weight:600; }
.price { font-size:15px; font-weight:700; color:#22c55e; }
.tags { display:flex; gap:6px; margin-bottom:6px; }
.tag { font-size:10px; font-weight:600; padding:2px 8px; border-radius:20px; }
.sativa { background:rgba(234,179,8,0.1); color:#92400e; border:1px solid rgba(234,179,8,0.2); }
.indica { background:rgba(124,58,237,0.1); color:#5b21b6; border:1px solid rgba(124,58,237,0.2); }
.hybrid { background:rgba(34,197,94,0.1); color:#166534; border:1px solid rgba(34,197,94,0.2); }
.thc { background:rgba(255,255,255,0.05); color:#555; border:1px solid #222; }
.desc { font-size:12px; color:#444; line-height:1.5; margin-bottom:10px; }
.foot { display:flex; justify-content:space-between; align-items:center; }
.stock { font-size:11px; color:#333; }
.low { color:#92400e; }
.add { background:#22c55e; border:none; border-radius:8px; color:#000; font-size:12px; font-weight:700; padding:7px 16px; cursor:pointer; font-family:inherit; }
.added { background:#166534; color:#4ade80; }
.fab { position:fixed; bottom:24px; right:24px; width:56px; height:56px; border-radius:50%; background:#22c55e; border:none; font-size:24px; cursor:pointer; z-index:100; box-shadow:0 4px 24px rgba(34,197,94,0.4); }
.popup { position:fixed; bottom:92px; right:16px; width:calc(100% - 32px); max-width:340px; background:#111; border:1px solid #1e1e1e; border-radius:20px; overflow:hidden; z-index:100; display:none; flex-direction:column; }
.popup.on { display:flex; }
.ph { background:#0d0d0d; border-bottom:1px solid #1a1a1a; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; }
.ph-name { font-size:14px; font-weight:700; }
.ph-name span { color:#22c55e; }
.ph-close { background:none; border:none; color:#555; font-size:22px; cursor:pointer; line-height:1; }
.pm { height:220px; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; background:#080808; }
.mr { display:flex; gap:6px; align-items:flex-end; }
.mr.u { justify-content:flex-end; }
.bbl { max-width:82%; padding:8px 12px; font-size:13px; line-height:1.55; border-radius:4px 14px 14px 14px; background:#141414; border:1px solid #1e1e1e; color:#ddd; }
.bbl.u { background:#22c55e; border-radius:14px 4px 14px 14px; color:#000; font-weight:500; border:none; }
.pi-row { padding:10px 12px; display:flex; gap:8px; border-top:1px solid #141414; background:#0d0d0d; }
.pi { flex:1; background:#141414; border:1px solid #1e1e1e; border-radius:10px; color:#fff; padding:8px 12px; font-size:13px; font-family:inherit; resize:none; outline:none; }
.ps { width:32px; height:32px; border-radius:9px; background:#22c55e; border:none; color:#000; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
</style>
</head>
<body>

<header>
  <div class="brand">Budd<span>i</span></div>
  <button class="cart-btn" id="cart-btn" onclick="showCart()">🛒 Cart (0)</button>
</header>

<main>
  <button class="back" onclick="location.href='/'">← Back to Buddi</button>
  <h1>Today's Menu</h1>
  <p class="sub">Michigan · Recreational & Medical</p>
  <div class="cats">
    <button class="cat on" onclick="filter('all',this)">All</button>
    <button class="cat" onclick="filter('flower',this)">🌿 Flower</button>
    <button class="cat" onclick="filter('edibles',this)">🍬 Edibles</button>
    <button class="cat" onclick="filter('concentrates',this)">💎 Concentrates</button>
    <button class="cat" onclick="filter('vapes',this)">💨 Vapes</button>
  </div>
  <div class="grid" id="grid"></div>
</main>

<button class="fab" id="fab" onclick="toggleChat()">🌿</button>

<div class="popup" id="popup">
  <div class="ph">
    <div class="ph-name">Budd<span>i</span></div>
    <button class="ph-close" onclick="toggleChat()">×</button>
  </div>
  <div class="pm" id="pm"></div>
  <div class="pi-row">
    <textarea class="pi" id="pi" rows="1" placeholder="Ask about any product..."></textarea>
    <button class="ps" onclick="psend()">↑</button>
  </div>
</div>

<script>
const P=[
  {id:1,name:"Blue Dream 3.5g",cat:"flower",type:"sativa",thc:"22%",price:32,icon:"🌿",desc:"Uplifting and creative. Sweet berry aroma. Perfect for daytime.",stock:14},
  {id:2,name:"Granddaddy Purple 3.5g",cat:"flower",type:"indica",thc:"20%",price:28,icon:"🌿",desc:"Deep relaxation and sleep. Sweet grape and berry flavors.",stock:8},
  {id:3,name:"Wedding Cake 3.5g",cat:"flower",type:"hybrid",thc:"25%",price:35,icon:"🌿",desc:"Balanced and potent. Vanilla and tangy flavors. Great for stress.",stock:11},
  {id:4,name:"OG Kush 3.5g",cat:"flower",type:"indica",thc:"19%",price:30,icon:"🌿",desc:"Classic earthy pine flavor. Full body relaxation.",stock:3},
  {id:5,name:"Sour Diesel 3.5g",cat:"flower",type:"sativa",thc:"21%",price:30,icon:"🌿",desc:"Energizing. Diesel aroma. Perfect for morning sessions.",stock:7},
  {id:6,name:"Gummies 10-Pack 100mg",cat:"edibles",type:"hybrid",thc:"100mg",price:18,icon:"🍬",desc:"10mg per gummy. Assorted fruit flavors. Great for microdosing.",stock:20},
  {id:7,name:"Chocolate Bar 100mg",cat:"edibles",type:"indica",thc:"100mg",price:22,icon:"🍫",desc:"Dark chocolate, 10 pieces at 10mg each.",stock:15},
  {id:8,name:"Live Resin Cart 1g",cat:"vapes",type:"hybrid",thc:"78%",price:45,icon:"💨",desc:"Full spectrum live resin. 510 thread.",stock:9},
  {id:9,name:"Distillate Cart 1g",cat:"vapes",type:"sativa",thc:"85%",price:38,icon:"💨",desc:"Ultra-refined distillate. Clean and consistent.",stock:12},
  {id:10,name:"Live Rosin 1g",cat:"concentrates",type:"hybrid",thc:"72%",price:60,icon:"💎",desc:"Solventless. Full flavor. For experienced consumers.",stock:5},
  {id:11,name:"Shatter 1g",cat:"concentrates",type:"sativa",thc:"80%",price:40,icon:"💎",desc:"Glass-like consistency. Great for dabbing.",stock:6},
];
let cart=[], msgs=[], loading=false, open=false, init=false;

function render(cat){
  const items=cat==="all"?P:P.filter(p=>p.cat===cat);
  document.getElementById("grid").innerHTML=items.map(p=>`
    <div class="card">
      <div class="icon">${p.icon}</div>
      <div class="info">
        <div class="row"><span class="name">${p.name}</span><span class="price">$${p.price}</span></div>
        <div class="tags"><span class="tag ${p.type}">${p.type.toUpperCase()}</span><span class="tag thc">THC ${p.thc}</span></div>
        <div class="desc">${p.desc}</div>
        <div class="foot">
          <span class="stock ${p.stock<=5?'low':''}">${p.stock<=5?"⚠️ Only "+p.stock+" left":p.stock+" in stock"}</span>
          <button class="add" id="b${p.id}" onclick="addCart(${p.id})">Add to Cart</button>
        </div>
      </div>
    </div>`).join("");
}

function filter(cat,btn){
  document.querySelectorAll(".cat").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
  render(cat);
}

function addCart(id){
  const p=P.find(x=>x.id===id);
  const e=cart.find(x=>x.id===id);
  if(e)e.qty++;else cart.push({...p,qty:1});
  const b=document.getElementById("b"+id);
  if(b){b.textContent="Added ✓";b.classList.add("added");setTimeout(()=>{b.textContent="Add to Cart";b.classList.remove("added");},1500);}
  const cartBtn=document.getElementById("cart-btn");
if(cartBtn)cartBtn.textContent="🛒 Cart ("+cart.reduce((s,i)=>s+i.qty,0)+")";
}

function toggleChat(){
  open=!open;
  document.getElementById("popup").classList.toggle("on",open);
  document.getElementById("fab").textContent=open?"×":"🌿";
  if(open&&!init){
    addMsg("assistant","Hey! 👋 I can see the full menu. Ask me anything about any product!");
    init=true;
  }
}

function addMsg(role,text){
  msgs.push({role,content:text});
  const c=document.getElementById("pm");
  const d=document.createElement("div");
  d.className="mr"+(role==="user"?" u":"");
  d.innerHTML=`<div class="bbl${role==="user"?" u":""}">${text}</div>`;
  c.appendChild(d);
  c.scrollTop=c.scrollHeight;
}

document.getElementById("pi").addEventListener("keydown",function(e){
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();psend();}
});

async function psend(){
  const inp=document.getElementById("pi");
  const txt=inp.value.trim();
  if(!txt||loading)return;
  inp.value="";
  loading=true;
  addMsg("user",txt);
  const menu=P.map(p=>`${p.name} | ${p.type} | THC ${p.thc} | $${p.price} | ${p.desc}`).join("\n");
  try{
    const res=await fetch("/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:200,
        system:"You are Buddi, an AI budtender. Keep answers to 1-3 sentences. Current menu:\n"+menu+"\n\nCustomer's current cart: "+(cart.length===0?"Empty":cart.map(i=>i.name+" x"+i.qty+" ($"+i.price*i.qty+")").join(", "))+". Total: $"+cart.reduce((s,i)=>s+i.price*i.qty,0).toFixed(2),
        messages:msgs.slice(0,-1).concat([{role:"user",content:txt}])
      })
    });
    const data=await res.json();
    const reply=data.content?.find(b=>b.type==="text")?.text||"Sorry, try again.";
    addMsg("assistant",reply);
  }catch(e){addMsg("assistant","Connection error.");}
  finally{loading=false;}
}
function showCart(){
  if(cart.length===0){alert("Your cart is empty!");return;}
  const items=cart.map(i=>`${i.name} x${i.qty} — $${i.price*i.qty}`).join("\n");
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  if(confirm("YOUR CART:\n\n"+items+"\n\nTotal: $"+total.toFixed(2)+"\n\nTap OK to place order.")){
    alert("Order placed! You'll get an SMS confirmation soon.\n\n(SMS coming soon)");
    cart=[];
    document.getElementById("cart-btn").textContent="🛒 Cart (0)";
  }
}
render("all");
</script>
</body>
</html>
