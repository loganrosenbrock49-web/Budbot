<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Buddi — Shop</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  min-height: 100vh;
  color: #fff;
}
header {
  background: #0d0d0d;
  border-bottom: 1px solid #1a1a1a;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.logo {
  width: 36px; height: 36px; border-radius: 10px;
  background: #0a1a0f; border: 1px solid #1a2e1f;
  display: flex; align-items: center; justify-content: center;
}
.brand { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
.brand span { color: #22c55e; }
.cart-btn {
  background: #161616; border: 1px solid #222; border-radius: 12px;
  color: #fff; font-size: 13px; font-weight: 600;
  padding: 8px 16px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: all 0.2s; font-family: inherit;
}
.cart-btn:hover { border-color: #22c55e; color: #22c55e; }
.cart-count {
  background: #22c55e; color: #000;
  font-size: 11px; font-weight: 700;
  width: 18px; height: 18px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.back-btn {
  background: transparent; border: none;
  color: #555; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; gap: 6px;
  font-family: inherit; transition: color 0.2s;
}
.back-btn:hover { color: #fff; }
main { max-width: 480px; margin: 0 auto; padding: 20px 16px 120px; }
.page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: #444; margin-bottom: 20px; }
.categories {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
}
.cat-btn {
  background: transparent; border: 1px solid #1e1e1e;
  border-radius: 20px; color: #555; font-size: 12px;
  padding: 6px 14px; cursor: pointer;
  transition: all 0.18s; font-family: inherit;
}
.cat-btn.active { background: #22c55e; border-color: #22c55e; color: #000; font-weight: 700; }
.cat-btn:hover:not(.active) { border-color: #333; color: #888; }
.product-grid { display: flex; flex-direction: column; gap: 12px; }
.product-card {
  background: #111; border: 1px solid #1e1e1e;
  border-radius: 16px; padding: 16px;
  display: flex; gap: 14px; align-items: flex-start;
  transition: border-color 0.2s;
}
.product-card:hover { border-color: #2a2a2a; }
.product-icon {
  width: 52px; height: 52px; border-radius: 12px;
  background: #0a1a0f; border: 1px solid #1a2e1f;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0;
}
.product-info { flex: 1; }
.product-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.product-name { font-size: 15px; font-weight: 600; color: #fff; }
.product-price { font-size: 15px; font-weight: 700; color: #22c55e; }
.product-meta { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
.tag {
  font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px;
  letter-spacing: 0.04em;
}
.tag-sativa { background: rgba(234,179,8,0.1); color: #854d0e; border: 1px solid rgba(234,179,8,0.15); }
.tag-indica { background: rgba(124,58,237,0.1); color: #5b21b6; border: 1px solid rgba(124,58,237,0.15); }
.tag-hybrid { background: rgba(34,197,94,0.1); color: #166534; border: 1px solid rgba(34,197,94,0.15); }
.tag-thc { background: rgba(255,255,255,0.05); color: #555; border: 1px solid #222; }
.product-desc { font-size: 12px; color: #444; line-height: 1.5; margin-bottom: 10px; }
.product-footer { display: flex; align-items: center; justify-content: space-between; }
.stock { font-size: 11px; color: #333; }
.stock.low { color: #854d0e; }
.add-btn {
  background: #22c55e; border: none; border-radius: 8px;
  color: #000; font-size: 12px; font-weight: 700;
  padding: 7px 16px; cursor: pointer; font-family: inherit;
  transition: background 0.2s;
}
.add-btn:hover { background: #16a34a; }
.add-btn.added { background: #166534; color: #4ade80; }
.section-label {
  font-size: 11px; letter-spacing: 0.1em; color: #333;
  font-weight: 600; margin-bottom: 12px; margin-top: 4px;
}
/* CART DRAWER */
#cart-drawer {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: #111; border-top: 1px solid #1e1e1e;
  border-radius: 24px 24px 0 0;
  padding: 20px 20px 40px;
  box-shadow: 0 -20px 60px rgba(0,0,0,0.6);
  transition: transform 0.3s ease;
  transform: translateX(-50%) translateY(100%);
  z-index: 200;
}
#cart-drawer.open { transform: translateX(-50%) translateY(0); }
.drawer-handle {
  width: 36px; height: 4px; background: #222; border-radius: 2px;
  margin: 0 auto 20px;
}
.drawer-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
.cart-items { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; max-height: 240px; overflow-y: auto; }
.cart-item {
  display: flex; align-items: center; justify-content: space-between;
  background: #161616; border: 1px solid #1e1e1e; border-radius: 12px; padding: 10px 14px;
}
.cart-item-name { font-size: 14px; font-weight: 500; color: #fff; }
.cart-item-price { font-size: 14px; color: #22c55e; font-weight: 600; }
.remove-btn {
  background: transparent; border: none; color: #333;
  font-size: 18px; cursor: pointer; padding: 0 0 0 10px;
  transition: color 0.2s; font-family: inherit;
}
.remove-btn:hover { color: #ef4444; }
.cart-total {
  display: flex; justify-content: space-between; align-items: center;
  border-top: 1px solid #1a1a1a; padding-top: 14px; margin-bottom: 14px;
}
.cart-total-label { font-size: 14px; color: #555; }
.cart-total-amount { font-size: 20px; font-weight: 700; color: #22c55e; }
.checkout-btn {
  width: 100%; padding: 14px; background: #22c55e; border: none;
  border-radius: 12px; color: #000; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: inherit; transition: background 0.2s;
}
.checkout-btn:hover { background: #16a34a; }
.empty-cart { text-align: center; color: #333; font-size: 14px; padding: 20px 0; }
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 150;
}
.overlay.active { display: block; }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeCart()"></div>

<header>
  <div class="header-left">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M12 2C6 2 2 8 2 14c0 4 2.5 6.5 5 7.5C8 22 10 22 12 22s4 0 5-0.5c2.5-1 5-3.5 5-7.5 0-6-4-12-10-12z" fill="#22c55e"/>
        <path d="M12 3v17M12 3c1.5 3 3 6 1.5 11M12 3c-1.5 3-3 6-1.5 11" stroke="#fff" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
      </svg>
    </div>
    <div class="brand">Budd<span>i</span></div>
  </div>
  <button class="cart-btn" onclick="toggleCart()">
    🛒 Cart <span class="cart-count" id="cart-count">0</span>
  </button>
</header>

<main>
  <button class="back-btn" onclick="window.location='/'">← Back to Buddi</button>
  <br/><br/>
  <div class="page-title">Today's Menu</div>
  <div class="page-sub">Michigan · Recreational & Medical · Updated daily</div>

  <div class="categories">
    <button class="cat-btn active" onclick="filterCat('all', this)">All</button>
    <button class="cat-btn" onclick="filterCat('flower', this)">🌿 Flower</button>
    <button class="cat-btn" onclick="filterCat('edibles', this)">🍬 Edibles</button>
    <button class="cat-btn" onclick="filterCat('concentrates', this)">💎 Concentrates</button>
    <button class="cat-btn" onclick="filterCat('vapes', this)">💨 Vapes</button>
  </div>

  <div class="section-label">FEATURED</div>
  <div class="product-grid" id="product-grid"></div>
</main>

<!-- CART DRAWER -->
<div id="cart-drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">Your Cart</div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-total">
    <span class="cart-total-label">Total</span>
    <span class="cart-total-amount" id="cart-total">$0.00</span>
  </div>
  <button class="checkout-btn" onclick="checkout()">Place Order →</button>
</div>

<script>
const PRODUCTS = [
  { id:1, name:"Blue Dream 3.5g", category:"flower", type:"sativa", thc:"22%", price:32, icon:"🌿", desc:"Uplifting and creative. Perfect for daytime use. Sweet berry aroma with hints of vanilla.", stock:14 },
  { id:2, name:"Granddaddy Purple 3.5g", category:"flower", type:"indica", thc:"20%", price:28, icon:"🌿", desc:"Deep relaxation and sleep. Sweet grape and berry flavors. Great for evening use.", stock:8 },
  { id:3, name:"Wedding Cake 3.5g", category:"flower", type:"hybrid", thc:"25%", price:35, icon:"🌿", desc:"Balanced and potent. Rich vanilla and tangy flavors. Great for stress relief.", stock:11 },
  { id:4, name:"OG Kush 3.5g", category:"flower", type:"indica", thc:"19%", price:30, icon:"🌿", desc:"Classic earthy pine flavor. Full body relaxation. A timeless favorite.", stock:3 },
  { id:5, name:"Sour Diesel 3.5g", category:"flower", type:"sativa", thc:"21%", price:30, icon:"🌿", desc:"Energizing and fast-acting. Diesel fuel aroma. Perfect for morning sessions.", stock:7 },
  { id:6, name:"Gummies 10-Pack 100mg", category:"edibles", type:"hybrid", thc:"100mg", price:18, icon:"🍬", desc:"10mg per gummy. Assorted fruit flavors. Perfect for microdosing.", stock:20 },
  { id:7, name:"Chocolate Bar 100mg", category:"edibles", type:"indica", thc:"100mg", price:22, icon:"🍫", desc:"Dark chocolate infused with premium distillate. 10 pieces, 10mg each.", stock:15 },
  { id:8, name:"Live Resin Cart 1g", category:"vapes", type:"hybrid", thc:"78%", price:45, icon:"💨", desc:"Full spectrum live resin. Preserves original terpene profile. 510 thread.", stock:9 },
  { id:9, name:"Distillate Cart 1g", category:"vapes", type:"sativa", thc:"85%", price:38, icon:"💨", desc:"Ultra-refined distillate with natural terpenes. Clean and consistent hits.", stock:12 },
  { id:10, name:"Live Rosin 1g", category:"concentrates", type:"hybrid", thc:"72%", price:60, icon:"💎", desc:"Solventless extraction. Full flavor and potency. For experienced consumers.", stock:5 },
  { id:11, name:"Shatter 1g", category:"concentrates", type:"sativa", thc:"80%", price:40, icon:"💎", desc:"Glass-like consistency. Clean and potent. Great for dabbing.", stock:6 },
];

let cart = [];
let currentCat = "all";

function renderProducts(cat) {
  const grid = document.getElementById("product-grid");
  const filtered = cat === "all" ? PRODUCTS : PRODUCTS.filter(p => p.category === cat);
  grid.innerHTML = filtered.map(p => `
    <div class="product-card" id="card-${p.id}">
      <div class="product-icon">${p.icon}</div>
      <div class="product-info">
        <div class="product-header">
          <span class="product-name">${p.name}</span>
          <span class="product-price">$${p.price}</span>
        </div>
        <div class="product-meta">
          <span class="tag tag-${p.type}">${p.type.toUpperCase()}</span>
          <span class="tag tag-thc">THC ${p.thc}</span>
        </div>
        <div class="product-desc">${p.desc}</div>
        <div class="product-footer">
          <span class="stock ${p.stock <= 5 ? 'low' : ''}">${p.stock <= 5 ? '⚠️ Only ' + p.stock + ' left' : p.stock + ' in stock'}</span>
          <button class="add-btn" id="btn-${p.id}" onclick="addToCart(${p.id})">Add to Cart</button>
        </div>
      </div>
    </div>
  `).join("");
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderProducts(cat);
}

function addToCart(id) {
  const product = PRODUCTS.find(p => p.id === id);
  const existing = cart.find(c => c.id === id);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({ ...product, qty: 1 });
  }
  const btn = document.getElementById("btn-" + id);
  btn.textContent = "Added ✓";
  btn.classList.add("added");
  setTimeout(() => {
    btn.textContent = "Add to Cart";
    btn.classList.remove("added");
  }, 1500);
  updateCartCount();
}

function updateCartCount() {
  const total = cart.reduce((sum, i) => sum + i.qty, 0);
  document.getElementById("cart-count").textContent = total;
}

function toggleCart() {
  const drawer = document.getElementById("cart-drawer");
  const overlay = document.getElementById("overlay");
  drawer.classList.toggle("open");
  overlay.classList.toggle("active");
  renderCart();
}

function closeCart() {
  document.getElementById("cart-drawer").classList.remove("open");
  document.getElementById("overlay").classList.remove("active");
}

function renderCart() {
  const container = document.getElementById("cart-items");
  const totalEl = document.getElementById("cart-total");
  if (cart.length === 0) {
    container.innerHTML = '<div class="empty-cart">Your cart is empty</div>';
    totalEl.textContent = "$0.00";
    return;
  }
  container.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div>
        <div class="cart-item-name">${item.name} ${item.qty > 1 ? "x" + item.qty : ""}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="cart-item-price">$${item.price * item.qty}</span>
        <button class="remove-btn" onclick="removeFromCart(${item.id})">×</button>
      </div>
    </div>
  `).join("");
  const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
  totalEl.textContent = "$" + total.toFixed(2);
}

function removeFromCart(id) {
  cart = cart.filter(c => c.id !== id);
  updateCartCount();
  renderCart();
}

function checkout() {
  if (cart.length === 0) return;
  const total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
  alert("Order submitted! Total: $" + total.toFixed(2) + "\n\nYou'll receive an SMS confirmation shortly.\n\n(SMS integration coming soon)");
  cart = [];
  updateCartCount();
  closeCart();
}

renderProducts("all");
</script>
</body>
</html>
