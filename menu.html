* { margin: 0; padding: 0; box-sizing: border-box; }
body {

  min-height: 100vh;
  color: #fff;
}
header {
  background: #0d0d0d;

  align-items: center;

  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.logo {

}

.brand span { color: #22c55e; }
.header-right { display: flex; align-items: center; gap: 8px; }
.cart-btn {

  color: #fff; font-size: 13px; font-weight: 600;
  padding: 8px 16px; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: all 0.2s; font-family: inherit;
}
.cart-btn:hover { border-color: #22c55e; color: #22c55e; }
.cart-count {
  background: #22c55e; color: #000;

  display: flex; align-items: center; justify-content: center;
}
main { max-width: 480px; margin: 0 auto; padding: 20px 16px 140px; }

}

.page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: #444; margin-bottom: 20px; }
.categories {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px;
}

  padding: 6px 14px; cursor: pointer;
  transition: all 0.18s; font-family: inherit;
}
